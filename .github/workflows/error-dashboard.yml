name: Daily Datadog Error Dashboard

# Runs every morning, regenerates the self-contained error dashboard from
# Datadog for the last 1 day, and commits it to the repo root so the existing
# root-served GitHub Pages site picks it up automatically.
#
# Published URL: https://yuvilblr.github.io/review-report/error-dashboard.html
#
# REQUIRED SETUP (one time):
#   1. Repo Settings -> Secrets and variables -> Actions -> New repository secret:
#        DD_API_KEY  = <your Datadog API key>
#        DD_APP_KEY  = <your Datadog Application key>  (ideally a read-only scoped key)
#   2. Repo Settings -> Pages -> Source: "Deploy from a branch", Branch: main, Folder: / (root)
#
# You can also trigger it by hand from the Actions tab (workflow_dispatch).

on:
  schedule:
    # 02:30 UTC == 08:00 Asia/Kolkata (IST, UTC+5:30)
    # NOTE: GitHub cron can be delayed by several minutes under load.
    - cron: '30 2 * * *'
  workflow_dispatch: {}

# Allow the job to commit the regenerated HTML back to the repo.
permissions:
  contents: write

# Never run two dashboard builds at once.
concurrency:
  group: error-dashboard
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dashboard (last 1 day)
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          set +e
          python3 .claude/skills/error-dashboard/generate-dashboard.py \
            --window 1d \
            --service rqillp-lp \
            --env eu-learning-prod \
            --span-operation express.request,http.request \
            --output error-dashboard.html \
            --teams-card teams-card.json \
            --rum-app-id 435b9647-49ef-4d7b-95e4-fb95c31626e9 \
            --rum-env prod-eulaerdallearning
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "Dashboard generated successfully."
          elif [ "$code" -eq 3 ]; then
            # Exit 3 = zero events in the window: a genuine, non-error skip.
            echo "::warning::No events found in the last day; nothing new to publish."
          elif [ "$code" -eq 2 ]; then
            echo "::error::DD_API_KEY / DD_APP_KEY missing or invalid (exit 2). Check the repository secrets."
            exit 2
          else
            # Exit 1 (uncaught exception) or any other non-zero = real failure. Do NOT mask it.
            echo "::error::Dashboard generation failed (exit $code) — see the Python traceback above."
            exit "$code"
          fi

      - name: Commit & push if the dashboard changed
        run: |
          if [ ! -f error-dashboard.html ]; then
            echo "No dashboard file was produced (e.g. no events); nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add error-dashboard.html
          if git diff --cached --quiet; then
            echo "No changes in error-dashboard.html; skipping commit."
          else
            git commit -m "chore: daily error dashboard ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Notify Teams
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          # Skip cleanly if the secret isn't configured yet, so the run still passes.
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL secret not set; skipping Teams notification."
            exit 0
          fi
          # No card file means no events this run (generator exit 3) — nothing to announce.
          if [ ! -f teams-card.json ]; then
            echo "No teams-card.json produced (e.g. no events); skipping Teams notification."
            exit 0
          fi
          echo "Posting summary card to Teams..."
          curl -sS -X POST "$TEAMS_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -w '\nHTTP %{http_code}\n' \
            --data @teams-card.json
