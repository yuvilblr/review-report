name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}

            Review the changes in this pull request. Focus on bugs, security
            (injection, XSS, secrets, auth), performance, error handling, and
            code quality.

            Post your review as a SINGLE GitHub PR review with INLINE comments
            anchored to specific file/line positions. Steps:

            1. Get the PR head commit SHA:
               gh pr view $PR_NUMBER --repo $REPO --json headRefOid -q .headRefOid

            2. Read the PR diff so you know which lines are addressable:
               gh pr diff $PR_NUMBER --repo $REPO
               Each inline comment must reference a path + line that appears on
               the RIGHT side (added/modified) of the diff. Drop any finding
               whose line isn't in the diff.

            3. Write the review payload to /tmp/review.json. Schema:
               {
                 "commit_id": "<HEAD_SHA>",
                 "event": "REQUEST_CHANGES",   // or "COMMENT" or "APPROVE"
                 "body": "<one-paragraph overall verdict>",
                 "comments": [
                   {"path": "buggy.js", "line": 3, "side": "RIGHT",
                    "body": "Hardcoded secret committed to source..."},
                   ...
                 ]
               }
               Use APPROVE if the PR looks fine, REQUEST_CHANGES for serious
               issues, otherwise COMMENT.

            4. Submit the review:
               gh api -X POST \
                 /repos/$REPO/pulls/$PR_NUMBER/reviews \
                 --input /tmp/review.json

            Submit exactly one review. Do not also leave a top-level issue
            comment.
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(git diff:*),Bash(git log:*),Bash(cat:*),Read,Write,Grep,Glob"


