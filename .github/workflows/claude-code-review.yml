name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review the changes in this pull request. Focus on bugs, security
            issues (injection, XSS, secrets, auth), performance, error handling,
            and code quality.

            When you are done analyzing, post your review as a single PR comment
            using the gh CLI. Use a heredoc so newlines and markdown render
            correctly:

              gh pr comment ${{ github.event.pull_request.number }} \
                --repo ${{ github.repository }} \
                --body "$(cat <<'MSG'
              ## Claude review

              <your overall verdict>

              - file:line — issue description
              - file:line — issue description
              MSG
              )"

            If the PR looks fine, post a comment that says so. Always post
            exactly one comment.
          claude_args: |
            --max-turns 25
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git diff:*),Bash(git log:*),Read,Grep,Glob"


