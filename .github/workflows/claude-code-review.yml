name: LP Gate Keeper

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: lp-gate-keeper-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lp-gate-keeper:
    # Run only on READY (non-draft) PRs; skip Claude-authored branches.
    if: ${{ github.event.pull_request.draft == false && !startsWith(github.event.pull_request.head.ref, 'claude/') }}

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Run LP Gate Keeper
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
            PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

            You are a senior code reviewer. Review THIS pull request and post a single review. Review ONLY — do not modify files or open other PRs.

            1. Read the diff + context:
                 gh pr diff $PR_NUMBER --repo $REPO
                 gh pr view $PR_NUMBER --repo $REPO
               Read changed files for context as needed.

            1a. Account for what the author has already addressed (this runs again on every push, so credit prior work):
                 gh api repos/$REPO/pulls/$PR_NUMBER/comments    # your earlier inline comments + author replies
                 gh api repos/$REPO/issues/$PR_NUMBER/comments   # PR conversation
               For every issue you would raise:
               - If the current code already fixes it, omit it.
               - If the author replied with a sound, specific justification that it is intentional or not applicable (e.g. "validated upstream", "internal-only endpoint"), accept it — do NOT raise it as Must Fix (note it as acknowledged at most).
               - Keep a finding as Must Fix ONLY when it is genuine, unaddressed harm and any justification is missing or unconvincing.
               Comment authority — WHO said it matters (check each comment's author login):
               - A comment or reply by the repository owner **yuvilblr** saying a finding can be skipped / is acceptable / will not be fixed is AUTHORITATIVE: drop that finding and let the build pass, even if you would otherwise rate it Must Fix. yuvilblr's decision is final.
               - A justification from ANY OTHER author (peers) is advisory only: accept it solely when it is technically sound and specific. If it does not convince you, KEEP the finding as Must Fix and add the note "needs @yuvilblr's decision" — do NOT pass it on a peer's say-so.
               You defer to yuvilblr's explicit skip; you adjudicate everyone else on merit. Never pass genuine harm because a peer said "not required", and never re-flag something already fixed, soundly justified, or waived by yuvilblr.

            2. Review for: correctness/logic bugs, unhandled edge cases (null/undefined/empty), race conditions, security (secrets, injection, XSS, auth/authz, IDOR, data exposure), performance, error handling, code quality, and missing tests.

            3. Assign severity with a STRICT bar — DO NOT inflate:
               - Must Fix = real harm in normal operation (no attacker needed) OR realistically exploitable. Release-blocking. If you can't name the concrete harm + a plausible trigger, it is NOT Must Fix.
               - Security = genuinely exploitable or real data exposure; GRADE each High / Moderate / Low. A finding whose own description is "not exploitable" / "defense-in-depth" does NOT belong here.
               - Should Fix = real but bounded, conditional, hardening, defense-in-depth, OR a deployment/config toggle that just needs setting (config is not a vulnerability).
               - Nice to Have = validation polish, dead code, `any` typing, naming, stale comments.
               When severity depends on a deployment fact you can't verify from the diff, pick the LOWER bucket and state the condition inline (e.g. "→ Must Fix if the SPA is cross-origin with cookies"). A review with 0 Must Fix is a valid, good outcome — do not pad.

            4. Build /tmp/review.json and submit ONE PR review:
                 {
                   "commit_id": "$PR_HEAD_SHA",
                   "event": "<REQUEST_CHANGES if >=1 Must Fix or High-severity Security; else COMMENT; APPROVE only if truly nothing>",
                   "body": "<the Markdown summary from step 5>",
                   "comments": [
                     {"path": "<file>", "line": <n>, "side": "RIGHT",
                      "body": "**[Must Fix|High|Moderate|Low|Should Fix|Nice]** <finding>. **Fix:** <fix>"}
                   ]
                 }
               Each inline comment must reference a path + line on the RIGHT (added/modified) side of the diff; drop findings whose line isn't in the diff. Submit:
                 gh api -X POST /repos/$REPO/pulls/$PR_NUMBER/reviews --input /tmp/review.json

            5. The "body" must be GitHub-flavored Markdown in EXACTLY this shape (tables render natively):

               ## 🛡️ LP Gate Keeper
               **Verdict:** <⚠️ Needs changes | ✅ Looks good | 🛑 Major rework> · **<n> Must Fix · <n> Security · <n> Should Fix · <n> Nice**

               ### 🔴 Must Fix
               | Location | Issue | Suggested Fix |
               |---|---|---|
               (rows — or a single line: _None at the strict bar._)

               ### 🛡️ Security
               | Severity | Location | Issue | Fix |
               |---|---|---|---|
               (use 🔴 High / 🟠 Moderate / 🟢 Low — NOT all red; or _None._)

               ### 🟡 Should Fix
               | Location | Issue |
               |---|---|
               (if more than 8 rows, wrap the table in <details><summary>Show N</summary> … </details>; or _None._)

               ### 🟢 Nice to Have
               | Location | Issue |
               |---|---|
               (or _None._)

               Keep tables to FEW columns so they render in the narrow PR pane. "Location" is ONE `path:line` cell in backticks (GitHub links it) — do NOT split file and line, and do NOT add a Severity column to Must Fix (the heading already says it). Only report issues you verified in the diff. Be concise and specific. End the comment body with a final line: _— 🛡️ LP Gate Keeper · automated review_
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Write,Read,Grep,Glob"

      - name: Gate on review verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq '[.[] | select(.user.login=="github-actions[bot]")] | last | .state // "NONE"')
          echo "Latest Claude review state: $STATE"
          if [ "$STATE" = "CHANGES_REQUESTED" ]; then
            echo "::error::LP Gate Keeper requested changes (Must Fix / High-severity findings present) — failing this check."
            exit 1
          fi
          echo "No blocking findings (state: $STATE) — check passes."
